<!DOCTYPE html>
<html>
<head>
    <title>Book Two Wheeler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f8f9fa;
        }
        .form-container{
            width:85%;
            margin:40px auto;
        }
        h3{
            font-weight:500;
            margin-bottom:20px;
        }
        .btn-primary{
            padding:5px 14px;
            font-size:14px;
        }
        .tab-content{
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="form-container">

    <h3>Book Your Two Wheeler</h3>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="alert alert-success">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>
        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>

        <select name="model" class="form-control mb-3" required>
            <option value="">Select Model</option>
            <option>Activa110</option>
  <option>Activa 125</option>
  <option>Dio 110</option>
  <option>Dio 125</option>
  <option>Livo Drum</option>
  <option>Livo Disk</option>
  <option>Shine 100</option>
  <option>Shine 125</option>
  <option>SP 125</option>
  <option>SP 160</option>
  <option>Unicorn</option>
  <option>CB Hornet 125</option>
  <option>Hornet</option>
  <option>Nx 200</option>

        </select>

        <select name="location" class="form-control mb-3" required>
            <option value="">Select Location</option>
            <option>Ballari</option>
  <option>Bengalore</option>
  <option>Belgaum</option>
  <option>Bharamasagara</option>
  <option>Bidar</option>
  <option>Bijapur</option>
  <option>Challakere</option>
  <option>Chikmagalur</option>
  <option>Chitradurga</option>
  <option>Davanagere</option>
  <option>Dharwad</option>
  <option>Dandeli</option>
  <option>Hasan</option>
  <option>Hiriyur</option>
  <option>Hospet</option>
  <option>Hosadurga</option>
  <option>Hubli</option>
  <option>Kalaburagi</option>
  <option>Mangakuru</option>
  <option>Mysore</option>
  <option>Nayakanahatty</option>
  <option>Raichur</option>
  <option>Ranebennur</option>
  <option>Shimoga</option>
  <option>Tumkur</option>
  <option>Tarikere</option>
  <option>Udupi</option>
        </select>

        <button class="btn btn-primary">Book Now</button>
    </form>

   <div id="offerCarousel" class="carousel slide mb-4" data-bs-ride="carousel">
  <div class="carousel-inner">
    {% for banner in banners %}
      <div class="carousel-item {% if loop.first %}active{% endif %}">
        <img src="{{ url_for('static', filename='images/banners/' + banner) }}" 
             class="d-block w-100" 
             style="height:300px; object-fit:cover;">
      </div>
    {% endfor %}
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#offerCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#offerCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
        <div class="tab-pane fade" id="blogs">
            {% for blog in blogs %}
                <h5 class="mt-3">{{ blog.title }}</h5>
                <p>{{ blog.content }}</p>
                <hr>
            {% endfor %}
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
