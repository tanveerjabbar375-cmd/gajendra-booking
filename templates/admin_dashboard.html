<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f8f9fa;
        }
        .container-box{
            width:90%;
            margin:40px auto;
        }
    </style>
</head>
<body>

<div class="container-box">

    <h3>Admin Dashboard</h3>
    <form method="GET" action="/dashboard" class="row g-3 mb-3">

    <div class="col-md-3">
        <label>From Date</label>
        <input type="date" name="from_date" class="form-control">
    </div>

    <div class="col-md-3">
        <label>To Date</label>
        <input type="date" name="to_date" class="form-control">
    </div>

    <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary me-2">Filter</button>
        <a href="/dashboard" class="btn btn-secondary">Reset</a>
    </div>

</form>

<div class="mb-3">
    <a href="/export/excel?from_date={{ request.args.get('from_date') }}&to_date={{ request.args.get('to_date') }}" class="btn btn-success btn-sm">Export Excel</a>

    <a href="/export/pdf?from_date={{ request.args.get('from_date') }}&to_date={{ request.args.get('to_date') }}" class="btn btn-danger btn-sm">Export PDF</a>

    <a href="/export/word?from_date={{ request.args.get('from_date') }}&to_date={{ request.args.get('to_date') }}" class="btn btn-primary btn-sm">Export Word</a>
</div>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#bookings">Bookings</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#blogs">Blogs</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#addBlog">Add Blog</button>
        </li>
    </ul>

    <div class="tab-content mt-3">

        <div class="tab-pane fade show active" id="bookings">
            <table class="table table-bordered">
                <tr>
                    <th>Name</th>
                    <th>Model</th>
                    <th>Phone</th>
                    <th>Location</th>
                    <th>Date</th>
                </tr>
                {% for b in bookings %}
                <tr>
                    <td>{{ b.name }}</td>
                    <td>{{ b.model }}</td>
                    <td>{{ b.phone }}</td>
                    <td>{{ b.location }}</td>
                    <td>{{ b.date }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>

        <div class="tab-pane fade" id="blogs">
            {% for blog in blogs %}
                <h5>{{ blog.title }}</h5>
                <p>{{ blog.content }}</p>
                <a href="/delete_blog/{{ blog.id }}" class="text-danger">Delete</a>
                <hr>
            {% endfor %}
        </div>

        <div class="tab-pane fade" id="addBlog">
            <form method="POST" action="/add_blog">
                <input type="text" name="title" class="form-control mb-3" placeholder="Blog Title" required>
                <textarea name="content" class="form-control mb-3" placeholder="Blog Content" required></textarea>
                <button class="btn btn-primary">Add Blog</button>
            </form>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
