<!DOCTYPE html>
<html>
<head>
    <title>Edit Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Edit Vehicle</h3>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="name" value="{{ vehicle.name }}" class="form-control mb-2" required>

        <select name="category" class="form-control mb-2" required>
            <option {% if vehicle.category == 'Scooter' %}selected{% endif %}>Scooter</option>
            <option {% if vehicle.category == 'Motorcycle' %}selected{% endif %}>Motorcycle</option>
            <option {% if vehicle.category == 'Electric' %}selected{% endif %}>Electric</option>
        </select>

        <input type="number" name="price" value="{{ vehicle.price }}" class="form-control mb-2" required>

        <input type="text" name="badge" value="{{ vehicle.badge }}" class="form-control mb-2">

        <input type="file" name="image" class="form-control mb-2">

        <button class="btn btn-primary">Update</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
