<!DOCTYPE html>
<html>
<head>
    <title>{{ blog.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; }
        .blog-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>{{ blog.title }}</h1>
    {% if blog.image %}
    <img src="{{ url_for('static', filename='uploads/' + blog.image) }}" alt="{{ blog.alt_text }}" class="blog-img">
    {% endif %}
    <p>{{ blog.content | safe }}</p>
    <a href="{{ url_for('booking') }}" class="btn btn-primary mt-3">Back to Home</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
